<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./CSS/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <title>Mario jump</title>
</head>
<body>
    <div class="game-box">

        <div class="score-board">
            <div id="current-score">Pontuação: 0</div>
            <div id="high-score-display">Recorde: 0</div>
        </div>

        <img src="./Img/clouds.png" class="nuvens" id="nuvens">
        
        <img src="./Img/mario.gif" class="mario" id="mario">

        <img src="./Img/pipe.png" class="pipe" id="pipe">
        
        <div class="game-over" id="game-over">
            <h1>Game Over</h1>
            <button id="restart-button"><i class='bx bxs-caret-right-circle'></i></button>
        </div>
    </div>
    
    <script src="./JavaScript/script.js" defer></script>
</body>
</html>
